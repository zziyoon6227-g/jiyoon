<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>객체 조작 및 생성</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
$(function( ){
var result_1 = $("#chk1").prop("checked"); /*false*/
console.log(result_1);

var result_2 = $("#chk2").prop("checked"); /*chk2는 체크 되어있어서 true*/
console.log(result_2);

var result_3 = $("#chk3").prop("checked", true); /*chk3은 체크 안되어있어서 false이지만 트루로 강제변경한건데 콘솔에는 트루로 안나오고 물리적인 표현으로 1로 나옴*/
console.log(result_3);

var result_4 = $("#se_1").prop("selectedIndex");  /*se_1로 가서 셀렉트된 인덱스를 찾음 opt3이니 2를 반환?*/
console.log(result_4);
});
</script>

</head>

<body>
    <h1><strong>객체 조작 및 생성</strong></h1>

    <form action="#" id="form_1">
        <p>
        <input type="checkbox" name="chk1" id="chk1">
        <label for="chk1">chk1</label>
        <input type="checkbox" name="chk2" id="chk2"
        checked>
        <label for="chk2">chk2</label>
        <input type="checkbox" name="chk3" id="chk3">
        <label for="chk3">chk3</label>
        </p>
        <p>
        <select name="se_1" id="se_1">
        <option value="opt1">option1</option>
        <option value="opt2">option2</option>
        <option value="opt3" selected>option3</option>
        <option value="opt4">option4</option>

        </select>
        </p>
        </form>
        </body>
        </html>
