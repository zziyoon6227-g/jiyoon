<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 포지셔닝</title>
    <style>
        #wrap{
            position: relative;
            width: 300px;
            height: 300px;
            border: 1px solid rgb(177, 7, 7);
        }
        .box{
            position: absolute;
            width: 50px;
            height: 50px;
            background: #4f6e07;
        }
        #box1{ top: 0; left: 0;}
        #box2{ top: -20px; right: 0;}
        #box3{ bottom: 0; left: 0;}
        #box4{ bottom: 0; right: 0;}
        #box5{ top: 200px; left: 100px;}
    </style>
</head>
<body>
    <div id="wrap">
<div class="box" id="box1"></div>
<div class="box" id="box2"></div>
<div class="box" id="box3"></div>
<div class="box" id="box4"></div>
<div class="box" id="box5"></div>
</body>
</html>
