<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .c-box {
            box-sizing: content-box;
            width: 300px; padding: 30px; height:30px; border: 10px solid #38dbf8; background-color: blue;
        }

        .b-box {
            box-sizing: border-box;
            width: 300px; padding: 30px; height:30px; border: 10px solid #38dbf8; background-color: blue;
        }
    </style>
</head>

<body>
<div class="c-box">전체 가로 380px</div>
<div class="b-box">전체 가로 300px</div>
</body>

</html>
