<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선택문</title>
    <script>

var site = prompt("네이버,다음,네이트,구글 중 \
이동하고 싶은 사이트를 기재하세요","");
        
var url;

switch(site){
case "구글" : url = "www.google.com";
break; 
case "다음" : url = "www.daum.net";
break;
case "네이버" : url = "www.naver.com";
break;
case "네이트" : url = "www.nate.com";
break;
default: alert("보기 중에 없는");
}
if(url) {location.href = "http://" + url;} /*웬만하면 중문 달아주기*/
    </script>
</head>

</body>
</html>
