<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap 예제</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #6f42c1, #f8f9fa);
      color: #000;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .btn-purple {
      background-color: #6f42c1;
      color: white;
    }
  </style>
</head>
<body>

  <!-- 네비게이션 -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Bootstrap</a>
    </div>
  </nav>

  <!-- 메인 영역 -->
  <section class="hero">
    <h1 class="display-4 fw-bold">Bootstrap으로 빠르게</h1>
    <h2 class="mb-4">반응형 사이트 빌드하기</h2>
    <p class="lead">
      강력하고 확장 가능한 프론트엔드 툴킷
    </p>

    <button class="btn btn-purple btn-lg">
      문서 읽어보기
    </button>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
