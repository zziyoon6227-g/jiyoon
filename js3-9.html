<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>continue문</title>
    <script>
for(var i = 1; i <= 10; i++){
    if( i % 2 == 1 ) continue; /*continue면 밑으로 안가고 위로 가서 계속 진행*/
document.write(i, "<p>");
}
        
    </script>
</head>
<body>
    
</body>
</html>
