<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>break문</title>
    <script>
for(var i = 1; i <= 100; i++){
    if(i==60) break; /*60은 출력되지 않음*/
    document.write(i, "<br>");
}
    document.write("=== The End ===")
    </script>
</head>
<body>
    
</body>
</html>
