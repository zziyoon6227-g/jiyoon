<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>

    <script language="javascript">

        function ranData(){
            var date = new Date();
            var x = date.getSeconds();
            var y = (x % 5) + 1;
            alert("난수= " + y);
        }

    </script>
</head>
<body>
    
    <a href="#" onclick= "ranData()"> 난수 발생 시키기</a>
</body>
</html>
