    <body>
<form method="get" action="radio_checkbox" enctype="UTF-8"></form>
<fieldset>
<legend>신청 과목</legend>
<p>이 달에 신청할 과목을 선택하세요(1과목만 가능)</p>
<label><input type="radio" name="subject" value="회화">회화</label>
<label><input type="radio" name="subject" value="문법">문법</label>
<label><input type="radio" name="subject" value="작문">작문</label>
</fieldset>

<fieldset>
    <legend>메일링</legend>
    <p>메일로 받고 싶은 뉴스 주제를 선택해 주세요(복수 선택 가능)</p>
    <label><input type="checkbox" name="mailing" value="해외 단신">해외 단신</label>
    <label><input type="checkbox" name="mailing" value="5분 회화">5분 회화</label>
    <label><input type="checkbox" name="mailing" value="모닝팝스">모닝팝스</label>

</fieldset>
<input type="submit" value="신청하기">
</form>
