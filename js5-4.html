<!DOCTYPE html>
<html lang="KO">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수</title>

    <script>
var rightID = "ehtm";
var rightPW = "1234";
function login(){
    if(fom.id.value == rightID){
        if(fom.pwd.value == rightPW){
            document.write(fom.id.value + "님 방문을 환영합니다.");
        }else{
            alert("잘못된 패스워드입니다");
        }
    }else{
        alert("존재하지 않는 아이디");
        location.reload();
    }
}
</script>
</head>
<body>
    <form name = "fom">
        <h1 style="text-align:center">회원 가입창</h1>
        <table aLign = "center">


            <tr>
                <td width = "200"><p align="right">아이디</td>
                <td width = "400"><input type="text" name="id"></td>
            </tr>

            <tr>
                <td width = "200"><p align="right">비밀번호</td>
                <td width = "400"><input type="password" name="pwd"></td>
            </tr>

            <tr>
                <td width = "200"><p>&nbsp;</p></td>
                <td width = "400">
                    <input type="submit" value="로그인하기" onclick="login()"></td>
            </tr>


        </table>
    </form>
</body>
</html>
